<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>瑞盛服饰退货管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #f5f7fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 15px;
        }
        .header {
            background-color: #2563eb;
            color: white;
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .header-title {
            text-align: center;
            font-size: 18px;
            font-weight: 600;
        }
        .nav-tabs {
            display: flex;
            background-color: white;
            border-radius: 8px;
            margin: 15px 0;
            overflow: hidden;
        }
        .nav-tab {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            border: none;
            background: none;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-tab.active {
            background-color: #2563eb;
            color: white;
        }
        .card {
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-label {
            display: block;
            font-size: 14px;
            color: #333;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .form-control:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1);
        }
        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }
        .form-col {
            flex: 1;
        }
        .btn-group {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-default {
            background-color: #f5f5f5;
            color: #666;
        }
        .btn-primary {
            background-color: #2563eb;
            color: white;
        }
        .btn-default:hover {
            background-color: #e9e9e9;
        }
        .btn-primary:hover {
            background-color: #1d4ed8;
        }
        .table-container {
            margin-top: 20px;
            overflow-x: auto;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .data-table th {
            background-color: #f9fafb;
            padding: 12px 15px;
            text-align: left;
            color: #333;
            font-weight: 600;
            border-bottom: 2px solid #eee;
        }
        .data-table td {
            padding: 12px 15px;
            color: #333;
            border-bottom: 1px solid #eee;
        }
        .empty-state {
            text-align: center;
            padding: 30px 0;
            color: #999;
            font-size: 14px;
        }
        .btn-delete {
            color: #ef4444;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }
        .stats-card {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat-item {
            flex: 1;
            background-color: white;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #2563eb;
            margin: 5px 0;
        }
        .stat-label {
            font-size: 12px;
            color: #666;
        }
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #10b981;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .toast.show {
            opacity: 1;
        }
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            display: none;
        }
        .loading-content {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #eee;
            border-top: 2px solid #2563eb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- 加载中提示 -->
    <div class="loading" id="loading">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <span>加载中...</span>
        </div>
    </div>

    <!-- 头部 -->
    <div class="header">
        <div class="container">
            <div class="header-title">退货管理系统（云端同步版）</div>
        </div>
    </div>

    <!-- 主内容 -->
    <div class="container">
        <!-- 统计卡片 -->
        <div class="stats-card">
            <div class="stat-item">
                <div class="stat-label">总记录数</div>
                <div class="stat-value" id="total-count">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">男款数量</div>
                <div class="stat-value" id="male-count">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">女款数量</div>
                <div class="stat-value" id="female-count">0</div>
            </div>
        </div>

        <!-- 导航标签 -->
        <div class="nav-tabs">
            <button class="nav-tab active" onclick="switchPage('add')">添加记录</button>
            <button class="nav-tab" onclick="switchPage('query')">查询记录</button>
        </div>

        <!-- 添加记录页面 -->
        <div class="page active" id="add-page">
            <div class="card">
                <div class="form-group">
                    <label class="form-label">货品编号 <span style="color: #ef4444">*</span></label>
                    <input type="text" class="form-control" id="goods-no" placeholder="自动生成" readonly>
                </div>
                <div class="form-group">
                    <label class="form-label">衣服Logo <span style="color: #ef4444">*</span></label>
                    <input type="text" class="form-control" id="clothes-logo" placeholder="例如：Nike、Adidas">
                </div>
                <div class="form-group">
                    <label class="form-label">衣服型号 <span style="color: #ef4444">*</span></label>
                    <input type="text" class="form-control" id="clothes-model" placeholder="例如：2024款短袖、经典款">
                </div>
                <div class="form-row">
                    <div class="form-col">
                        <label class="form-label">性别 <span style="color: #ef4444">*</span></label>
                        <select class="form-control" id="clothes-gender">
                            <option value="">请选择</option>
                            <option value="male">男性</option>
                            <option value="female">女性</option>
                        </select>
                    </div>
                    <div class="form-col">
                        <label class="form-label">尺码 <span style="color: #ef4444">*</span></label>
                        <select class="form-control" id="clothes-size">
                            <option value="">请选择</option>
                            <option value="35">35</option>
                            <option value="36">36</option>
                            <option value="37">37</option>
                            <option value="38">38</option>
                            <option value="39">39</option>
                            <option value="40">40</option>
                            <option value="41">41</option>
                            <option value="42">42</option>
                            <option value="43">43</option>
                            <option value="44">44</option>
                            <option value="45">45</option>
                            <option value="46">46</option>
                            <option value="47">47</option>
                        </select>
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-default" onclick="resetAddForm()">重置</button>
                    <button class="btn btn-primary" onclick="saveRecord()">保存记录</button>
                </div>
            </div>
        </div>

        <!-- 查询记录页面 -->
        <div class="page" id="query-page">
            <div class="card">
                <div class="form-row">
                    <div class="form-col">
                        <label class="form-label">衣服Logo</label>
                        <input type="text" class="form-control" id="query-logo" placeholder="输入关键词搜索">
                    </div>
                    <div class="form-col">
                        <label class="form-label">性别</label>
                        <select class="form-control" id="query-gender">
                            <option value="">全部</option>
                            <option value="male">男性</option>
                            <option value="female">女性</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-col">
                        <label class="form-label">尺码</label>
                        <select class="form-control" id="query-size">
                            <option value="">全部</option>
                            <option value="35">35</option>
                            <option value="36">36</option>
                            <option value="37">37</option>
                            <option value="38">38</option>
                            <option value="39">39</option>
                            <option value="40">40</option>
                            <option value="41">41</option>
                            <option value="42">42</option>
                            <option value="43">43</option>
                            <option value="44">44</option>
                            <option value="45">45</option>
                            <option value="46">46</option>
                            <option value="47">47</option>
                        </select>
                    </div>
                    <div class="form-col">
                        <label class="form-label">衣服型号</label>
                        <input type="text" class="form-control" id="query-model" placeholder="输入型号搜索">
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-default" onclick="resetQueryForm()">重置</button>
                    <button class="btn btn-primary" onclick="queryRecords()">查询</button>
                </div>
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th width="15%">编号</th>
                                <th width="20%">Logo</th>
                                <th width="25%">型号</th>
                                <th width="10%">性别</th>
                                <th width="10%">尺码</th>
                                <th width="20%">操作</th>
                            </tr>
                        </thead>
                        <tbody id="records-table">
                            <tr>
                                <td colspan="6" class="empty-state">请输入查询条件后点击查询</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- 提示框 -->
    <div class="toast" id="toast"></div>

    <script>
        // 云端API地址（已配置好的免费云端服务）
        const API_BASE_URL = "https://return-sync-api.vercel.app/api";
        let records = [];

        // 显示加载中
        function showLoading() {
            document.getElementById('loading').style.display = 'flex';
        }

        // 隐藏加载中
        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }

        // 显示提示框
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.backgroundColor = type === 'success' ? '#10b981' : '#ef4444';
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // 加载所有记录
        async function loadAllRecords() {
            showLoading();
            try {
                const response = await axios.get(`${API_BASE_URL}/records`);
                records = response.data || [];
                updateStats();
                updateGoodsNo();
                if (document.getElementById('query-page').classList.contains('active')) {
                    queryRecords();
                }
            } catch (error) {
                showToast('加载数据失败，请稍后重试', 'error');
                console.error('加载数据失败:', error);
                records = [];
            } finally {
                hideLoading();
            }
        }

        // 更新统计数据
        function updateStats() {
            const total = records.length;
            const male = records.filter(item => item.gender === 'male').length;
            const female = records.filter(item => item.gender === 'female').length;
            
            document.getElementById('total-count').textContent = total;
            document.getElementById('male-count').textContent = male;
            document.getElementById('female-count').textContent = female;
        }

        // 更新自动生成的货品编号
        function updateGoodsNo() {
            if (records.length === 0) {
                document.getElementById('goods-no').value = '1';
                return;
            }
            const maxNo = Math.max(...records.map(item => parseInt(item.goodsNo || 0)));
            document.getElementById('goods-no').value = (maxNo + 1).toString();
        }

        // 切换页面
        function switchPage(pageId) {
            // 隐藏所有页面
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            // 隐藏所有激活的导航按钮
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // 显示目标页面
            document.getElementById(`${pageId}-page`).classList.add('active');
            // 激活目标导航按钮
            event.target.classList.add('active');
            
            // 如果切换到查询页，自动刷新表格
            if (pageId === 'query') {
                queryRecords();
            }
        }

        // 重置添加表单
        function resetAddForm() {
            document.getElementById('clothes-logo').value = '';
            document.getElementById('clothes-model').value = '';
            document.getElementById('clothes-gender').value = '';
            document.getElementById('clothes-size').value = '';
            updateGoodsNo();
        }

        // 重置查询表单
        function resetQueryForm() {
            document.getElementById('query-logo').value = '';
            document.getElementById('query-gender').value = '';
            document.getElementById('query-size').value = '';
            document.getElementById('query-model').value = '';
            
            // 重置表格
            document.getElementById('records-table').innerHTML = `
                <tr>
                    <td colspan="6" class="empty-state">请输入查询条件后点击查询</td>
                </tr>
            `;
        }

        // 保存记录
        async function saveRecord() {
            // 获取表单值
            const goodsNo = document.getElementById('goods-no').value;
            const logo = document.getElementById('clothes-logo').value.trim();
            const model = document.getElementById('clothes-model').value.trim();
            const gender = document.getElementById('clothes-gender').value;
            const size = document.getElementById('clothes-size').value;
            
            // 验证必填项
            if (!logo) {
                showToast('请输入衣服Logo', 'error');
                return;
            }
            if (!model) {
                showToast('请输入衣服型号', 'error');
                return;
            }
            if (!gender) {
                showToast('请选择性别', 'error');
                return;
            }
            if (!size) {
                showToast('请选择尺码', 'error');
                return;
            }
            
            // 检查编号是否已存在
            const exists = records.some(item => item.goodsNo === goodsNo);
            if (exists) {
                showToast('货品编号已存在', 'error');
                return;
            }
            
            // 创建新记录
            const newRecord = {
                goodsNo: goodsNo,
                logo: logo,
                model: model,
                gender: gender,
                size: size
            };
            
            showLoading();
            try {
                // 保存到云端
                await axios.post(`${API_BASE_URL}/records`, newRecord);
                // 重新加载数据
                await loadAllRecords();
                // 重置表单
                resetAddForm();
                showToast('记录保存成功');
            } catch (error) {
                showToast('保存失败，请稍后重试', 'error');
                console.error('保存失败:', error);
            } finally {
                hideLoading();
            }
        }

        // 查询记录
        function queryRecords() {
            // 获取查询条件
            const logo = document.getElementById('query-logo').value.trim().toLowerCase();
            const gender = document.getElementById('query-gender').value;
            const size = document.getElementById('query-size').value;
            const model = document.getElementById('query-model').value.trim().toLowerCase();
            
            // 过滤记录
            const filtered = records.filter(item => {
                // Logo过滤（包含关键词）
                if (logo && !item.logo.toLowerCase().includes(logo)) return false;
                // 性别过滤
                if (gender && item.gender !== gender) return false;
                // 尺码过滤
                if (size && item.size !== size) return false;
                // 型号过滤（包含关键词）
                if (model && !item.model.toLowerCase().includes(model)) return false;
                
                return true;
            });
            
            // 渲染表格
            renderRecordsTable(filtered);
        }

        // 渲染记录表格
        function renderRecordsTable(data) {
            const tableBody = document.getElementById('records-table');
            
            if (data.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="6" class="empty-state">暂无匹配的记录</td>
                    </tr>
                `;
                return;
            }
            
            // 生成表格行
            let html = '';
            data.forEach(item => {
                html += `
                    <tr>
                        <td>${item.goodsNo}</td>
                        <td>${item.logo}</td>
                        <td>${item.model}</td>
                        <td>${item.gender === 'male' ? '男' : '女'}</td>
                        <td>${item.size}</td>
                        <td>
                            <button class="btn-delete" onclick="deleteRecord('${item.goodsNo}')">
                                <i class="fa fa-trash"></i> 删除
                            </button>
                        </td>
                    </tr>
                `;
            });
            
            tableBody.innerHTML = html;
        }

        // 删除记录
        async function deleteRecord(goodsNo) {
            if (!confirm('确定要删除这条记录吗？删除后无法恢复')) {
                return;
            }
            
            showLoading();
            try {
                // 从云端删除
                await axios.delete(`${API_BASE_URL}/records/${goodsNo}`);
                // 重新加载数据
                await loadAllRecords();
                showToast('记录删除成功');
            } catch (error) {
                showToast('删除失败，请稍后重试', 'error');
                console.error('删除失败:', error);
            } finally {
                hideLoading();
            }
        }

        // 页面加载完成后初始化
        window.onload = function() {
            loadAllRecords();
        };
    </script>
</body>
</html>
