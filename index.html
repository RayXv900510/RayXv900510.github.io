<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瑞盛服饰退货管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="#1a56db">
    <meta name="apple-mobile-web-app-title" content="瑞盛服饰退货管理">
    <link rel="apple-touch-icon" href="https://picsum.photos/192/192">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1a56db',
                        danger: '#ef4444',
                        success: '#10b981',
                        warning: '#f59e0b',
                        navActive: '#2563eb',
                        navInactive: '#4b5563',
                        navHover: '#374151'
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .shadow-card { box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
            .transition-all { transition: all 0.15s ease; }
            .modal-overlay {
                position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                background-color: rgba(0, 0, 0, 0.5);
                display: flex; justify-content: center; align-items: center;
                z-index: 9999; opacity: 0; visibility: hidden;
                transition: opacity 0.3s ease, visibility 0.3s ease;
            }
            .modal-overlay.active { opacity: 1; visibility: visible; }
            .modal-content {
                background-color: white; border-radius: 8px; padding: 2rem;
                min-width: 380px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
                transform: translateY(-20px); opacity: 0;
                transition: transform 0.3s ease, opacity 0.3s ease;
            }
            .modal-overlay.active .modal-content { transform: translateY(0); opacity: 1; }
            .modal-btn { padding: 1rem 2rem; border-radius: 6px; font-size: 1.1rem; font-weight: 500; cursor: pointer; transition: all 0.2s ease; min-width: 120px; }
            .table-cell-large { font-size: 1rem !important; padding: 12px 24px !important; line-height: 1.5 !important; }
            .table-header-large { font-size: 0.9rem !important; padding: 12px 24px !important; font-weight: 600 !important; }
            .nav-item { font-size: 1.1rem !important; padding: 1.25rem 1.5rem !important; font-weight: 500 !important; }
            .nav-icon { font-size: 1.3rem !important; width: 2rem !important; margin-right: 0.75rem !important; }
            .autocomplete-container { position: relative; width: 100%; }
            .autocomplete-list {
                position: absolute; top: 100%; left: 0; right: 0; max-height: 200px;
                overflow-y: auto; background: white; border: 1px solid #e5e7eb; border-top: none;
                border-radius: 0 0 0.375rem 0.375rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
                z-index: 10; margin: 0; padding: 0; list-style: none; display: none;
            }
            .autocomplete-list.show { display: block; }
            .autocomplete-item { padding: 0.75rem 1rem; cursor: pointer; transition: background-color 0.2s ease; }
            .autocomplete-item:hover { background-color: #f3f4f6; }
            .error-border { border-color: #ef4444 !important; }
            .error-text { color: #ef4444 !important; display: block !important; }
            /* 手机端导航按钮样式 */
            .mobile-nav { display: flex; gap: 2px; margin-bottom: 1rem; }
            .mobile-nav-btn { flex: 1; padding: 0.75rem 1rem; text-align: center; border-radius: 4px; font-weight: 500; transition: all 0.2s; }
            .mobile-nav-btn.active { background-color: #2563eb; color: white; }
            .mobile-nav-btn.inactive { background-color: #4b5563; color: #f3f4f6; }
            .mobile-nav-btn.inactive:hover { background-color: #374151; }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans">
<div class="flex h-screen overflow-hidden">
    <!-- 桌面端左侧导航（隐藏手机端） -->
    <aside class="bg-gray-800 text-white w-64 hidden md:block">
        <div class="p-4 border-b border-gray-700">
            <h1 class="text-xl font-bold flex items-center">
                <i class="fa fa-shopping-bag mr-2"></i>退货管理
            </h1>
        </div>
        <nav class="mt-5">
            <ul>
                <li><a href="#add" class="nav-item flex items-center bg-navActive text-white" onclick="switchTab('add')"><i class="fa fa-plus-circle nav-icon"></i> <span>添加记录</span></a></li>
                <li><a href="#query" class="nav-item flex items-center bg-navInactive text-gray-100 hover:bg-navHover hover:text-white transition-all" onclick="switchTab('query')"><i class="fa fa-search nav-icon"></i> <span>查询记录</span></a></li>
            </ul>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto">
        <header class="bg-white shadow-sm p-4">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <h2 id="pageTitle" class="text-lg font-semibold text-gray-800">添加退货记录</h2>
                
                <!-- 手机端导航切换按钮（隐藏桌面端） -->
                <div class="mobile-nav md:hidden">
                    <button id="mobileAddBtn" class="mobile-nav-btn active" onclick="switchTab('add')">
                        <i class="fa fa-plus-circle mr-1"></i> 添加记录
                    </button>
                    <button id="mobileQueryBtn" class="mobile-nav-btn inactive" onclick="switchTab('query')">
                        <i class="fa fa-search mr-1"></i> 查询记录
                    </button>
                </div>

                <div class="flex gap-4 hidden md:flex">
                    <div class="px-4 py-2 bg-primary/10 rounded-lg text-center">
                        <p class="text-xs text-gray-500">总记录数</p><p class="text-xl font-bold text-primary" id="totalCount">0</p>
                    </div>
                    <div class="px-4 py-2 bg-success/10 rounded-lg text-center">
                        <p class="text-xs text-gray-500">男款</p><p class="text-xl font-bold text-success" id="maleCount">0</p>
                    </div>
                    <div class="px-4 py-2 bg-warning/10 rounded-lg text-center">
                        <p class="text-xs text-gray-500">女款</p><p class="text-xl font-bold text-warning" id="femaleCount">0</p>
                    </div>
                </div>
            </div>

            <!-- 手机端统计数据（隐藏桌面端） -->
            <div class="flex gap-2 md:hidden mt-2">
                <div class="px-2 py-1 bg-primary/10 rounded-lg text-center flex-1">
                    <p class="text-xs text-gray-500">总记录</p><p class="text-lg font-bold text-primary" id="mobileTotalCount">0</p>
                </div>
                <div class="px-2 py-1 bg-success/10 rounded-lg text-center flex-1">
                    <p class="text-xs text-gray-500">男款</p><p class="text-lg font-bold text-success" id="mobileMaleCount">0</p>
                </div>
                <div class="px-2 py-1 bg-warning/10 rounded-lg text-center flex-1">
                    <p class="text-xs text-gray-500">女款</p><p class="text-lg font-bold text-warning" id="mobileFemaleCount">0</p>
                </div>
            </div>
        </header>

        <div id="addPage" class="p-6 block">
            <div class="bg-white rounded-lg shadow-card p-6">
                <h3 class="text-lg font-semibold mb-6">添加退货记录</h3>
                <form id="addForm" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">货品编号 <span class="text-danger">*</span></label>
                            <input type="text" id="goodsNo" placeholder="输入数字序号" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary" oninput="validateGoodsNo()">
                            <p id="goodsNoTip" class="mt-1 text-xs text-gray-400 hidden">编号已存在，请修改！</p>
                            <p id="goodsNoRule" class="mt-1 text-xs text-gray-400">编号规则：纯数字，不可重复</p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">衣服Logo <span class="text-danger">*</span></label>
                            <input type="text" id="logo" placeholder="例如：Nike" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary" onblur="autoFillModel()">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700 mb-1">衣服型号 <span class="text-danger">*</span></label>
                            <input type="text" id="model" placeholder="例如：2024款短袖" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                            <p id="modelTip" class="mt-1 text-xs text-gray-400 hidden">已自动匹配同款型号</p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">性别 <span class="text-danger">*</span></label>
                            <select id="gender" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary" onchange="autoFillModel()">
                                <option value="">请选择</option><option value="male">男性</option><option value="female">女性</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">尺码 <span class="text-danger">*</span></label>
                            <select id="size" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                                <option value="">请选择</option><option value="35">35</option><option value="36">36</option><option value="37">37</option><option value="38">38</option><option value="39">39</option><option value="40">40</option><option value="41">41</option><option value="42">42</option><option value="43">43</option><option value="44">44</option>
                            </select>
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700 mb-1">退货日期 <span class="text-danger">*</span></label>
                            <input type="date" id="returnDate" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                        </div>
                    </div>
                    <div class="flex justify-end space-x-4">
                        <button type="reset" class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-100" onclick="resetForm()">重置</button>
                        <button type="submit" class="px-4 py-2 bg-primary text-white rounded-md hover:bg-blue-700">保存记录</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="queryPage" class="p-6 hidden">
            <div class="bg-white rounded-lg shadow-card p-6">
                <h3 class="text-lg font-semibold mb-6">查询退货记录</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">衣服Logo</label>
                        <div class="autocomplete-container">
                            <input type="text" id="queryLogo" placeholder="输入Logo关键词" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary" oninput="showLogoSuggestions()" onblur="hideLogoSuggestions(200)" onfocus="showLogoSuggestions()">
                            <ul id="logoSuggestions" class="autocomplete-list"></ul>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">性别</label>
                        <select id="queryGender" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                            <option value="">全部</option><option value="male">男性</option><option value="female">女性</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">尺码</label>
                        <select id="querySize" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                            <option value="">全部</option><option value="35">35</option><option value="36">36</option><option value="37">37</option><option value="38">38</option><option value="39">39</option><option value="40">40</option><option value="41">41</option><option value="42">42</option><option value="43">43</option><option value="44">44</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">衣服型号</label>
                        <select id="queryModel" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                            <option value="">全部</option>
                        </select>
                    </div>
                </div>
                <div class="flex justify-end mb-6 space-x-4">
                    <button onclick="resetQuery()" class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-100">重置</button>
                    <button onclick="queryRecords()" class="px-4 py-2 bg-primary text-white rounded-md hover:bg-blue-700"><i class="fa fa-search mr-2"></i>查询</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead>
                            <tr class="bg-gray-50">
                                <th class="table-header-large text-left text-gray-500">货品编号</th>
                                <th class="table-header-large text-left text-gray-500">Logo</th>
                                <th class="table-header-large text-left text-gray-500">型号</th>
                                <th class="table-header-large text-left text-gray-500">性别</th>
                                <th class="table-header-large text-left text-gray-500">尺码</th>
                                <th class="table-header-large text-left text-gray-500">日期</th>
                                <th class="table-header-large text-left text-gray-500">操作</th>
                            </tr>
                        </thead>
                        <tbody id="recordTable" class="bg-white divide-y divide-gray-200">
                            <tr><td colspan="7" class="table-cell-large text-center text-gray-500">请输入条件后查询</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<div id="deleteModal" class="modal-overlay">
    <div class="modal-content">
        <h3 class="text-xl font-semibold text-gray-800 mb-4 text-center">确认删除</h3>
        <p class="text-gray-600 mb-8 text-center text-lg">确定要删除这条记录吗？删除后无法恢复。</p>
        <div class="flex justify-center gap-6">
            <button id="cancelDelete" class="modal-btn border border-gray-300 bg-white text-gray-700 hover:bg-gray-100">取消</button>
            <button id="confirmDelete" class="modal-btn bg-danger text-white hover:bg-red-600">确认删除</button>
        </div>
    </div>
</div>

<div id="toast" class="fixed top-4 right-4 bg-green-500 text-white px-6 py-3 rounded-md shadow-lg z-50 hidden transition-all duration-300 transform translate-x-0"></div>

<script>
    let records = JSON.parse(localStorage.getItem('clothingReturns')) || [];
    let maxSerialNumber = 0;
    let currentDeleteId = null;
    let logoSuggestionsTimeout = null;

    window.onload = function () {
        const storedMax = localStorage.getItem('maxSerialNumber');
        if (storedMax) {
            maxSerialNumber = parseInt(storedMax);
        } else if (records.length > 0) {
            const goodsNos = records.map(r => parseInt(r.goodsNo));
            maxSerialNumber = Math.max(...goodsNos);
        } else {
            maxSerialNumber = 0;
        }
        document.getElementById('returnDate').value = new Date().toISOString().split('T')[0];
        initGoodsNo();
        document.getElementById('addForm').onsubmit = function (e) { e.preventDefault(); addRecord(); };
        document.getElementById('cancelDelete').onclick = hideDeleteModal;
        document.getElementById('confirmDelete').onclick = confirmDeleteRecord;
        updateStats();
        updateModelOptions();
    };

    function switchTab(tab) {
        // 切换页面显示
        document.getElementById('addPage').style.display = tab === 'add' ? 'block' : 'none';
        document.getElementById('queryPage').style.display = tab === 'query' ? 'block' : 'none';
        document.getElementById('pageTitle').innerText = tab === 'add' ? '添加退货记录' : '查询退货记录';
        
        // 切换手机端导航按钮样式
        if (tab === 'add') {
            document.getElementById('mobileAddBtn').className = 'mobile-nav-btn active';
            document.getElementById('mobileQueryBtn').className = 'mobile-nav-btn inactive';
        } else {
            document.getElementById('mobileAddBtn').className = 'mobile-nav-btn inactive';
            document.getElementById('mobileQueryBtn').className = 'mobile-nav-btn active';
        }
        
        if (tab === 'add') initGoodsNo();
    }

    function initGoodsNo() {
        const next = (maxSerialNumber + 1).toString();
        const inp = document.getElementById('goodsNo');
        inp.value = next;
        inp.classList.remove('error-border');
        document.getElementById('goodsNoTip').classList.remove('error-text');
    }

    function validateGoodsNo() {
        const inp = document.getElementById('goodsNo');
        const v = inp.value.trim();
        const tip = document.getElementById('goodsNoTip');
        inp.classList.remove('error-border');
        tip.classList.remove('error-text');
        if (!v) {
            tip.textContent = '货品编号不能为空！';
            tip.classList.add('error-text');
            inp.classList.add('error-border');
            return false;
        }
        if (!/^\d+$/.test(v)) {
            tip.textContent = '必须是纯数字！';
            tip.classList.add('error-text');
            inp.classList.add('error-border');
            return false;
        }
        const has = records.some(x => x.goodsNo === v);
        if (has) {
            tip.textContent = '编号已存在！';
            tip.classList.add('error-text');
            inp.classList.add('error-border');
            return false;
        }
        const num = parseInt(v);
        if (num > maxSerialNumber) {
            maxSerialNumber = num;
            localStorage.setItem('maxSerialNumber', maxSerialNumber);
        }
        return true;
    }

    function resetForm() {
        document.getElementById('addForm').reset();
        document.getElementById('returnDate').value = new Date().toISOString().split('T')[0];
        initGoodsNo();
    }

    function updateStats() {
        const total = records.length;
        const male = records.filter(x => x.gender === 'male').length;
        const female = records.filter(x => x.gender === 'female').length;
        
        // 更新桌面端统计
        document.getElementById('totalCount').innerText = total;
        document.getElementById('maleCount').innerText = male;
        document.getElementById('femaleCount').innerText = female;
        
        // 更新手机端统计
        document.getElementById('mobileTotalCount').innerText = total;
        document.getElementById('mobileMaleCount').innerText = male;
        document.getElementById('mobileFemaleCount').innerText = female;
    }

    function addRecord() {
        if (!validateGoodsNo()) return;
        const goodsNo = document.getElementById('goodsNo').value.trim();
        const logo = document.getElementById('logo').value.trim();
        const model = document.getElementById('model').value.trim();
        const gender = document.getElementById('gender').value;
        const size = document.getElementById('size').value;
        const returnDate = document.getElementById('returnDate').value;
        if (!logo || !model || !gender || !size || !returnDate) {
            showToast('请填写完整信息');
            return;
        }
        records.push({ id: Date.now(), goodsNo, logo, model, gender, size, returnDate });
        localStorage.setItem('clothingReturns', JSON.stringify(records));
        updateStats();
        updateModelOptions();
        showToast('保存成功');
        resetForm();
    }

    function queryRecords() {
        const logo = document.getElementById('queryLogo').value.trim();
        const gender = document.getElementById('queryGender').value;
        const size = document.getElementById('querySize').value;
        const model = document.getElementById('queryModel').value;
        let list = records.filter(r => {
            if (logo && !r.logo.includes(logo)) return false;
            if (gender && r.gender !== gender) return false;
            if (size && r.size !== size) return false;
            if (model && r.model !== model) return false;
            return true;
        });
        const tb = document.getElementById('recordTable');
        tb.innerHTML = '';
        if (list.length === 0) {
            tb.innerHTML = '<tr><td colspan="7" class="table-cell-large text-center">无数据</td></tr>';
            return;
        }
        list.forEach(r => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="table-cell-large">${r.goodsNo}</td>
                <td class="table-cell-large">${r.logo}</td>
                <td class="table-cell-large">${r.model}</td>
                <td class="table-cell-large">${r.gender === 'male' ? '男' : '女'}</td>
                <td class="table-cell-large">${r.size}</td>
                <td class="table-cell-large">${r.returnDate}</td>
                <td class="table-cell-large"><button onclick="showDeleteModal(${r.id})" class="text-danger"><i class="fa fa-trash"></i> 删除</button></td>
            `;
            tb.appendChild(tr);
        });
    }

    function showDeleteModal(id) { currentDeleteId = id; document.getElementById('deleteModal').classList.add('active'); }
    function hideDeleteModal() { currentDeleteId = null; document.getElementById('deleteModal').classList.remove('active'); }

    function confirmDeleteRecord() {
        records = records.filter(x => x.id !== currentDeleteId);
        localStorage.setItem('clothingReturns', JSON.stringify(records));
        if (records.length > 0) {
            maxSerialNumber = Math.max(...records.map(x => parseInt(x.goodsNo)));
        } else {
            maxSerialNumber = 0;
        }
        localStorage.setItem('maxSerialNumber', maxSerialNumber);
        updateStats();
        updateModelOptions();
        queryRecords();
        hideDeleteModal();
        showToast('删除成功');
    }

    function resetQuery() {
        document.getElementById('queryLogo').value = '';
        document.getElementById('queryGender').value = '';
        document.getElementById('querySize').value = '';
        document.getElementById('queryModel').value = '';
        document.getElementById('recordTable').innerHTML = '<tr><td colspan="7" class="table-cell-large text-center">请输入条件后查询</td></tr>';
    }

    function updateModelOptions() {
        const sel = document.getElementById('queryModel');
        sel.innerHTML = '<option value="">全部</option>';
        const set = new Set(records.map(x => x.model).filter(Boolean));
        Array.from(set).sort().forEach(m => {
            const o = document.createElement('option');
            o.value = m; o.textContent = m;
            sel.appendChild(o);
        });
    }

    function autoFillModel() {
        const logo = document.getElementById('logo').value.trim();
        const gender = document.getElementById('gender').value;
        const size = document.getElementById('size').value;
        if (!logo || !gender || !size) return;
        const r = records.find(x => x.logo === logo && x.gender === gender && x.size === size);
        if (r) document.getElementById('model').value = r.model;
    }

    function showLogoSuggestions() {
        const v = document.getElementById('queryLogo').value.trim().toLowerCase();
        const ul = document.getElementById('logoSuggestions');
        ul.innerHTML = '';
        if (!v) { ul.classList.remove('show'); return; }
        const set = new Set(records.map(x => x.logo).filter(Boolean));
        const list = Array.from(set).filter(x => x.toLowerCase().includes(v)).sort();
        if (list.length === 0) { ul.classList.remove('show'); return; }
        list.forEach(x => {
            const li = document.createElement('li');
            li.className = 'autocomplete-item';
            li.textContent = x;
            ul.appendChild(li);
        });
        ul.classList.add('show');
    }

    function hideLogoSuggestions(delay) {
        setTimeout(() => document.getElementById('logoSuggestions').classList.remove('show'), delay);
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.remove('hidden');
        setTimeout(() => t.classList.add('hidden'), 2000);
    }
</script>
</body>
</html>
