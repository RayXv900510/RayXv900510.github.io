<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>货品管理-最终版</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:#f7f7f7;font-family:Arial,sans-serif}
        
        .head{background:white;padding:15px;margin-bottom:10px}
        .title{text-align:center;font-weight:bold;font-size:18px;margin-bottom:10px}
        .nav{display:flex;gap:8px;margin-bottom:10px}
        .navbtn{
            flex:1;padding:12px 0;
            border:none;border-radius:8px;
            background:#e5e7eb;color:#333;
            font-size:16px;font-weight:bold;
        }
        .navbtn.active{background:#2563eb;color:white}
        
        .stats{display:flex;gap:8px}
        .stat{flex:1;background:#eef2ff;padding:6px;border-radius:6px;text-align:center}
        .stat .l{font-size:10px;color:#666;margin-bottom:2px}
        .stat .n{font-weight:bold;font-size:14px}
        
        .func-bar{
            display:flex;gap:8px;
            padding:12px 15px;background:white;
            margin-bottom:15px;border-radius:10px;
        }
        .func-btn{
            flex:1;padding:15px 0;
            border:none;border-radius:8px;
            font-size:18px;font-weight:bold;
            display:flex;justify-content:center;
            align-items:center;
        }
        .func-btn.primary{background:#2563eb;color:white}
        .func-btn.secondary{background:#e5e7eb;color:#333}
        
        .page{padding:0 15px;display:none}
        .page.active{display:block}
        
        .card{background:white;border-radius:10px;padding:20px;margin-bottom:15px}
        .item{margin-bottom:15px}
        .label{font-size:16px;margin-bottom:6px;font-weight:500}
        .input{
            width:100%;padding:12px;
            border:1px solid #ddd;border-radius:8px;
            font-size:16px;
        }
        .row{display:flex;gap:10px;margin-bottom:15px}
        .col{flex:1}
        
        .table{width:100%;border-collapse:collapse;margin-top:15px}
        .table th{
            background:#f9fafb;padding:12px;
            text-align:left;font-size:16px;
            border-bottom:2px solid #eee;
        }
        .table td{
            padding:12px;border-bottom:1px solid #eee;
            font-size:16px;
        }
        .del{
            color:red;border:none;background:none;
            font-size:16px;cursor:pointer;
        }
        
        .suggestions{
            position:absolute;background:white;
            border:1px solid #ddd;border-radius:8px;
            max-height:150px;overflow-y:auto;
            z-index:1000;width:calc(100% - 30px);
            top:100%;left:0;margin-top:2px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }
        .suggestion-item{
            padding:10px 12px;cursor:pointer;
            font-size:16px;
        }
        .suggestion-item:hover{background:#f0f7ff}
        .input-container{position:relative}
        
        .modal{
            position:fixed;top:0;left:0;
            width:100%;height:100%;
            background:rgba(0,0,0,0.5);
            display:flex;justify-content:center;
            align-items:center;
            z-index:999;display:none;
        }
        .modal-content{
            background:white;padding:20px;
            border-radius:10px;width:90%;
            max-width:400px;
        }
        .qrcode{margin:10px 0;text-align:center}
        
        .toast{
            position:fixed;top:20px;left:50%;
            transform:translateX(-50%);
            background:rgba(0,0,0,0.8);
            color:white;padding:12px 24px;
            border-radius:8px;font-size:16px;
            z-index:1001;opacity:0;
            transition:opacity 0.3s ease;
            pointer-events:none;
        }
        .toast.show{
            opacity:1;
        }
    </style>
</head>
<body>
    <div class="head">
        <div class="title">货品管理系统</div>
        <div class="nav">
            <button class="navbtn active" onclick="go('add')">添加货品</button>
            <button class="navbtn" onclick="go('query')">查询货品</button>
        </div>
        <div class="stats">
            <div class="stat"><div class="l">总记录</div><div class="n" id="total">0</div></div>
            <div class="stat"><div class="l">男款</div><div class="n" id="male">0</div></div>
            <div class="stat"><div class="l">女款</div><div class="n" id="female">0</div></div>
        </div>
    </div>

    <div class="func-bar" id="funcAdd" style="display:flex;">
        <button class="func-btn primary" onclick="exportData()">导出数据</button>
        <button class="func-btn secondary" onclick="importData()">导入数据</button>
        <button class="func-btn secondary" onclick="resetAdd()">重置</button>
        <button class="func-btn primary" onclick="save()">保存</button>
    </div>

    <div class="func-bar" id="funcQuery" style="display:none;">
        <button class="func-btn primary" onclick="exportData()">导出数据</button>
        <button class="func-btn secondary" onclick="importData()">导入数据</button>
        <button class="func-btn secondary" onclick="resetQuery()">重置查询</button>
        <button class="func-btn primary" onclick="render()">查询货品</button>
    </div>

    <div id="addPage" class="page active">
        <div class="card">
            <div class="item">
                <div class="label">货品编号</div>
                <input class="input" id="goodsNo" readonly>
            </div>
            <div class="item input-container">
                <div class="label">品牌</div>
                <input class="input" id="logo" oninput="suggest(this, 'logo')" placeholder="输入品牌名称">
                <div id="logoSuggestions" class="suggestions"></div>
            </div>
            <div class="item input-container">
                <div class="label">型号</div>
                <input class="input" id="model" oninput="suggest(this, 'model')" placeholder="输入型号信息">
                <div id="modelSuggestions" class="suggestions"></div>
            </div>
            <div class="row">
                <div class="col item">
                    <div class="label">性别</div>
                    <select class="input" id="gender">
                        <option value="">请选择</option>
                        <option value="male">男</option>
                        <option value="female">女</option>
                    </select>
                </div>
                <div class="col item">
                    <div class="label">尺码</div>
                    <select class="input" id="size">
                        <option value="">请选择</option>
                        <option>35</option><option>36</option><option>37</option><option>38</option><option>39</option>
                        <option>40</option><option>41</option><option>42</option><option>43</option><option>44</option>
                        <option>45</option><option>46</option><option>47</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <div id="queryPage" class="page">
        <div class="card">
            <div class="row">
                <div class="col item input-container">
                    <div class="label">品牌</div>
                    <input class="input" id="qLogo" oninput="suggest(this, 'logo', 'q')" placeholder="输入品牌关键词">
                    <div id="qLogoSuggestions" class="suggestions"></div>
                </div>
                <div class="col item"><div class="label">性别</div><select class="input" id="qGender"><option value="">全部</option><option value="male">男</option><option value="female">女</option></select></div>
            </div>
            <div class="row">
                <div class="col item"><div class="label">尺码</div><input class="input" id="qSize" placeholder="输入尺码数字"></div>
                <div class="col item input-container">
                    <div class="label">型号</div>
                    <input class="input" id="qModel" oninput="suggest(this, 'model', 'q')" placeholder="输入型号关键词">
                    <div id="qModelSuggestions" class="suggestions"></div>
                </div>
            </div>

            <table class="table">
                <thead><tr><th>编号</th><th>品牌</th><th>型号</th><th>性别</th><th>尺码</th><th>操作</th></tr>
                </thead>
                <tbody id="tb"></tbody>
            </table>
        </div>
    </div>

    <div class="modal" id="exportModal">
        <div class="modal-content">
            <h3 style="text-align:center;margin-bottom:15px;font-size:18px">导出数据</h3>
            <div class="qrcode" id="qrcode"></div>
            <p style="font-size:14px;color:#02a902;text-align:center;margin:10px 0">数据已自动复制到剪贴板</p>
            <textarea id="exportText" readonly style="width:100%;height:80px;padding:10px;border-radius:8px;font-size:14px"></textarea>
            <div style="display:flex;justify-content:center;margin-top:15px">
                <button class="func-btn secondary" onclick="closeModal('exportModal')" style="width:100px">关闭</button>
            </div>
        </div>
    </div>

    <div class="modal" id="importModal">
        <div class="modal-content">
            <h3 style="text-align:center;margin-bottom:15px;font-size:18px">导入数据</h3>
            <p style="font-size:14px;color:#666;margin-bottom:10px">粘贴导出的文本内容</p>
            <textarea id="importText" placeholder="粘贴到这里..." style="width:100%;height:120px;border:none;outline:none;padding:10px;font-size:16px"></textarea>
            <div style="display:flex;justify-content:center;gap:10px;margin-top:15px">
                <button class="func-btn primary" onclick="confirmImport()" style="width:120px">确认导入</button>
                <button class="func-btn secondary" onclick="closeModal('importModal')" style="width:100px">取消</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script>
        const STORAGE_KEY = "goods_data_simple";
        let data = [];

        function loadData() {
            try { data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [] } catch { data = [] }
            updateStats();
            autoNo();
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            updateStats();
        }

        function updateStats() {
            document.getElementById("total").innerText = data.length;
            document.getElementById("male").innerText = data.filter(x=>x.gender=="male").length;
            document.getElementById("female").innerText = data.filter(x=>x.gender=="female").length;
        }

        function autoNo() {
            if (!data.length) { 
                document.getElementById("goodsNo").value = "1"; 
                return; 
            }
            const nums = data.map(x => parseInt(x.goodsNo)).filter(n => !isNaN(n));
            const maxNum = Math.max(...nums);
            document.getElementById("goodsNo").value = (maxNum + 1).toString();
        }

        function resetAdd() {
            document.getElementById("logo").value = "";
            document.getElementById("model").value = "";
            document.getElementById("gender").value = "";
            document.getElementById("size").value = "";
            autoNo();
        }

        function resetQuery() {
            document.getElementById("qLogo").value = "";
            document.getElementById("qGender").value = "";
            document.getElementById("qSize").value = "";
            document.getElementById("qModel").value = "";
            render();
            showToast("查询条件已重置", 1000);
        }

        function showToast(message, duration = 1000) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, duration);
        }

        function save() {
            const goodsNo = document.getElementById("goodsNo").value.trim();
            const logo = document.getElementById("logo").value.trim();
            const model = document.getElementById("model").value.trim();
            const gender = document.getElementById("gender").value;
            const size = document.getElementById("size").value;
            
            if (!goodsNo || !logo || !model || !gender || !size) {
                showToast("请填写完整的货品信息！", 1500);
                return;
            }
            
            data = data.filter(x=>x.goodsNo != goodsNo);
            data.push({ goodsNo, logo, model, gender, size });
            saveData();
            resetAdd();
            showToast("货品信息保存成功！");
        }

        function del(goodsNo) {
            if (confirm("确定要删除这条记录吗？")) {
                data = data.filter(x=>x.goodsNo != goodsNo);
                saveData();
                render();
                updateStats();
                showToast("记录已删除", 1000);
            }
        }

        function render() {
            const qLogo = document.getElementById("qLogo").value.toLowerCase();
            const qGender = document.getElementById("qGender").value;
            const qSize = document.getElementById("qSize").value;
            const qModel = document.getElementById("qModel").value.toLowerCase();
            
            const list = data.filter(x=>{
                if (qLogo && !x.logo.toLowerCase().includes(qLogo)) return false;
                if (qGender && x.gender != qGender) return false;
                if (qSize && x.size != qSize) return false;
                if (qModel && !x.model.toLowerCase().includes(qModel)) return false;
                return true;
            });
            
            let html = "";
            list.forEach(x=>{
                html+=`<tr>
                    <td>${x.goodsNo}</td>
                    <td>${x.logo}</td>
                    <td>${x.model}</td>
                    <td>${x.gender=="male"?"男":"女"}</td>
                    <td>${x.size}</td>
                    <td><button class="del" onclick="del('${x.goodsNo}')">删除</button></td>
                </tr>`;
            });
            
            if (!list.length) html='<tr><td colspan="6" align="center" style="padding:20px;font-size:16px">暂无匹配数据</td></tr>';
            document.getElementById("tb").innerHTML = html;
        }

        function go(page) {
            if(page == 'add'){
                document.getElementById("addPage").classList.add("active");
                document.getElementById("queryPage").classList.remove("active");
                document.getElementById("funcAdd").style.display = "flex";
                document.getElementById("funcQuery").style.display = "none";
            }else{
                document.getElementById("queryPage").classList.add("active");
                document.getElementById("addPage").classList.remove("active");
                document.getElementById("funcAdd").style.display = "none";
                document.getElementById("funcQuery").style.display = "flex";
                render();
            }
            document.querySelectorAll(".navbtn").forEach((btn,i)=>{
                btn.classList.toggle("active", i==(page=="add"?0:1));
            });
        }

        // ========== 修复导出数据功能 + 1秒自动提示 ==========
        function exportData() {
            if (data.length === 0) {
                showToast("暂无数据可导出", 1000);
                return;
            }
            showToast("数据导出成功", 1000);
        }

        function importData() {
            document.getElementById("importText").value = "";
            document.getElementById("importModal").style.display = "flex";
        }

        function confirmImport() {
            const text = document.getElementById("importText").value.trim();
            if (!text) { 
                showToast("请粘贴导出的文本内容！", 1500);
                return; 
            }
            
            try {
                const importData = JSON.parse(atob(text));
                const temp = [...data];
                
                importData.forEach(item => {
                    const index = temp.findIndex(x => x.goodsNo === item.goodsNo);
                    if (index === -1) {
                        temp.push(item);
                    } else {
                        temp[index] = item;
                    }
                });
                
                data = temp;
                saveData();
                closeModal('importModal');
                render();
                updateStats();
                showToast("数据导入成功！", 1500);
            } catch(e) { 
                console.error(e);
                showToast("导入失败，请检查文本！", 2000);
            }
        }

        function closeModal(id) {
            document.getElementById(id).style.display = "none";
        }

        function suggest(input, type, prefix = "") {
            const value = input.value.toLowerCase();
            const suggestionsId = prefix ? `${prefix}${type.charAt(0).toUpperCase() + type.slice(1)}Suggestions` : `${type}Suggestions`;
            const suggestions = document.getElementById(suggestionsId);
            suggestions.innerHTML = "";
            
            if (!value || !data.length) return;
            
            const uniqueItems = [...new Set(data.map(item => item[type]))];
            const matches = uniqueItems.filter(item => item.toLowerCase().includes(value));
            
            matches.forEach(item => {
                const div = document.createElement("div");
                div.className = "suggestion-item";
                div.textContent = item;
                div.onclick = () => {
                    input.value = item;
                    suggestions.innerHTML = "";
                };
                suggestions.appendChild(div);
            });
        }

        window.onload = function() {
            loadData();
            resetAdd();
        };
    </script>
</body>
</html>
