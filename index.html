<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>瑞盛服饰退货管理</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
<style>
body{margin:0;background:#f2f5f7;font-family:sans-serif}
.head{background:white;padding:10px 12px;position:sticky;top:0;z-index:10}
.nav{display:flex;gap:4px;margin:8px 0}
.btn-nav{flex:1;padding:10px 6px;border-radius:6px;border:none;background:#e5e7eb;font-size:14px}
.btn-nav.active{background:#2563eb;color:white}
.stats{display:flex;gap:6px}
.stat{flex:1;background:#eef2ff;padding:6px;border-radius:6px;text-align:center}
.stat .label{font-size:12px;color:#666}
.stat .num{font-size:15px;font-weight:bold}
.page{padding:10px}
.card{background:white;border-radius:10px;padding:12px}
.form-item{margin-bottom:10px}
.form-label{font-size:13px;margin-bottom:4px}
.form-input{width:100%;box-sizing:border-box;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:14px}
.row2{display:flex;gap:8px}
.row2 .col{flex:1}
.btn-area{display:flex;justify-content:flex-end;gap:8px;margin-top:10px}
.btn{padding:8px 14px;border-radius:6px;border:none;font-size:14px}
.btn-primary{background:#2563eb;color:white}
.table{width:100%;border-collapse:collapse;margin-top:10px;font-size:13px}
.table th{background:#f9fafb;padding:8px 4px;text-align:left}
.table td{padding:8px 4px;border-bottom:1px solid #eee}
.btn-del{color:#ef4444;background:none;border:none}
#queryPage{display:none}
</style>
</head>
<body>

<div class="head">
  <div style="text-align:center;font-weight:bold;font-size:16px;margin-bottom:4px">退货管理</div>
  <div class="nav">
    <button class="btn-nav active" onclick="go('add')">添加</button>
    <button class="btn-nav" onclick="go('query')">查询</button>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="label">总记录</div>
      <div class="num" id="total">0</div>
    </div>
    <div class="stat">
      <div class="label">男款</div>
      <div class="num" id="male">0</div>
    </div>
    <div class="stat">
      <div class="label">女款</div>
      <div class="num" id="female">0</div>
    </div>
  </div>
</div>

<div id="addPage" class="page">
  <div class="card">
    <div class="form-item">
      <div class="form-label">货品编号</div>
      <input class="form-input" id="goodsNo" readonly>
    </div>
    <div class="form-item">
      <div class="form-label">Logo</div>
      <input class="form-input" id="logo" placeholder="例如：Nike">
    </div>
    <div class="form-item">
      <div class="form-label">型号</div>
      <input class="form-input" id="model" placeholder="例如：2024款">
    </div>
    <div class="row2">
      <div class="col">
        <div class="form-label">性别</div>
        <select class="form-input" id="gender">
          <option value="">请选择</option>
          <option value="male">男</option>
          <option value="female">女</option>
        </select>
      </div>
      <div class="col">
        <div class="form-label">尺码</div>
        <select class="form-input" id="size">
          <option value="">请选择</option>
          <option>35</option><option>36</option><option>37</option><option>38</option><option>39</option>
          <option>40</option><option>41</option><option>42</option><option>43</option><option>44</option>
          <option>45</option><option>46</option><option>47</option>
        </select>
      </div>
    </div>
    <div class="btn-area">
      <button class="btn" onclick="resetAdd()">重置</button>
      <button class="btn btn-primary" onclick="saveItem()">保存</button>
    </div>
  </div>
</div>

<div id="queryPage" class="page">
  <div class="card">
    <div class="row2">
      <div class="col">
        <div class="form-label">Logo</div>
        <input class="form-input" id="qLogo" placeholder="关键词">
      </div>
      <div class="col">
        <div class="form-label">性别</div>
        <select class="form-input" id="qGender">
          <option value="">全部</option><option value="male">男</option><option value="female">女</option>
        </select>
      </div>
    </div>
    <div class="row2" style="margin-top:8px">
      <div class="col">
        <div class="form-label">尺码</div>
        <select class="form-input" id="qSize">
          <option value="">全部</option>
          <option>35</option><option>36</option><option>37</option><option>38</option><option>39</option>
          <option>40</option><option>41</option><option>42</option><option>43</option><option>44</option>
          <option>45</option><option>46</option><option>47</option>
        </select>
      </div>
      <div class="col">
        <div class="form-label">型号</div>
        <input class="form-input" id="qModel" placeholder="型号">
      </div>
    </div>
    <div class="btn-area">
      <button class="btn" onclick="resetQuery()">重置</button>
      <button class="btn btn-primary" onclick="renderTable()">查询</button>
    </div>
    <table class="table">
      <thead>
        <tr>
          <th>编号</th><th>Logo</th><th>型号</th><th>性别</th><th>尺码</th><th>操作</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script>
const API = "https://api.jsonbase.com/v1/buckets/return-manage/records";

let list = [];
let maxId = 0;

async function fetchAll() {
  try {
    let r = await fetch(API);
    let data = await r.json();
    list = data || [];
    maxId = list.length ? Math.max(...list.map(x => +x.goodsNo)) : 0;
    refreshStat();
    renderTable();
    resetAdd();
  } catch (e) {}
}

function refreshStat() {
  document.getElementById("total").innerText = list.length;
  document.getElementById("male").innerText = list.filter(x => x.gender == "male").length;
  document.getElementById("female").innerText = list.filter(x => x.gender == "female").length;
}

function resetAdd() {
  document.getElementById("logo").value = "";
  document.getElementById("model").value = "";
  document.getElementById("gender").value = "";
  document.getElementById("size").value = "";
  document.getElementById("goodsNo").value = maxId + 1;
}

function resetQuery() {
  document.getElementById("qLogo").value = "";
  document.getElementById("qGender").value = "";
  document.getElementById("qSize").value = "";
  document.getElementById("qModel").value = "";
  renderTable();
}

async function saveItem() {
  let goodsNo = document.getElementById("goodsNo").value;
  let logo = document.getElementById("logo").value.trim();
  let model = document.getElementById("model").value.trim();
  let gender = document.getElementById("gender").value;
  let size = document.getElementById("size").value;
  if (!logo || !model || !gender || !size) { alert("请填完整"); return; }
  let item = { goodsNo, logo, model, gender, size };
  await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(item)
  });
  fetchAll();
}

function renderTable() {
  let qLogo = document.getElementById("qLogo").value.toLowerCase();
  let qGender = document.getElementById("qGender").value;
  let qSize = document.getElementById("qSize").value;
  let qModel = document.getElementById("qModel").value.toLowerCase();
  let arr = list.filter(x => {
    if (qLogo && !x.logo.toLowerCase().includes(qLogo)) return false;
    if (qGender && x.gender != qGender) return false;
    if (qSize && x.size != qSize) return false;
    if (qModel && !x.model.toLowerCase().includes(qModel)) return false;
    return true;
  });
  let html = "";
  arr.forEach(x => {
    html += `
    <tr>
      <td>${x.goodsNo}</td>
      <td>${x.logo}</td>
      <td>${x.model}</td>
      <td>${x.gender=='male'?'男':'女'}</td>
      <td>${x.size}</td>
      <td><button class="btn-del" onclick="del('${x.goodsNo}')">删除</button></td>
    </tr>`;
  });
  if (!arr.length) html += `<tr><td colspan="6" style="text-align:center">无数据</td></tr>`;
  document.getElementById("tableBody").innerHTML = html;
}

async function del(goodsNo) {
  if (!confirm("确定删除？")) return;
  let id = list.find(x => x.goodsNo == goodsNo)?._id;
  if (!id) return;
  await fetch(API + "/" + id, { method: "DELETE" });
  fetchAll();
}

function go(page) {
  document.getElementById("addPage").style.display = page == "add" ? "block" : "none";
  document.getElementById("queryPage").style.display = page == "query" ? "block" : "none";
  let btns = document.querySelectorAll(".btn-nav");
  btns[0].classList.toggle("active", page == "add");
  btns[1].classList.toggle("active", page == "query");
}

fetchAll();
</script>
</body>
</html>
