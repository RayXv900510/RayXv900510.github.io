<!DOCTYPE html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>瑞盛服饰货品管理</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f6f7f9;font-family:Arial}
.head{background:#fff;padding:12px;position:sticky;top:0;z-index:10}
.title{text-align:center;font-weight:bold;font-size:17px;margin-bottom:8px}
.nav{display:flex;gap:6px;margin-bottom:10px}
.nav-btn{flex:1;padding:10px;border:none;border-radius:6px;background:#eee;font-size:14px}
.nav-btn.active{background:#2563eb;color:#fff}
.stats{display:flex;gap:6px;margin-bottom:10px}
.stat{flex:1;background:#eef2ff;padding:8px;border-radius:6px;text-align:center}
.stat .label{font-size:12px;color:#666}
.stat .num{font-weight:bold;font-size:16px}
.sync-btn{text-align:center;margin:10px 0}
.sync-btn button{padding:8px 15px;border:none;border-radius:6px;background:#10b981;color:#fff;font-size:14px}
.page{padding:12px}
.card{background:#fff;border-radius:10px;padding:14px;box-shadow:0 2px 5px #eee;margin-bottom:15px}
.form-item{margin-bottom:12px}
.form-label{font-size:14px;margin-bottom:4px}
.form-input{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:14px}
.row{display:flex;gap:8px}
.col{flex:1}
.btn-group{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}
.btn{padding:8px 14px;border-radius:6px;border:none;font-size:14px;cursor:pointer}
.btn-primary{background:#2563eb;color:#fff}
.table{width:100%;border-collapse:collapse;margin-top:12px}
.table th{background:#f9fafb;padding:8px;text-align:left;font-size:13px}
.table td{padding:8px;border-bottom:1px solid #eee;font-size:14px}
.del-btn{color:#ef4444;border:none;background:none;cursor:pointer}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;justify-content:center;align-items:center;z-index:999;display:none}
.modal-content{background:#fff;padding:20px;border-radius:10px;width:90%;max-width:400px;text-align:center}
.qrcode-container{margin:15px 0;height:250px;display:flex;justify-content:center;align-items:center}
#import-area{margin:15px 0;padding:10px;border:1px dashed #ddd;border-radius:6px;min-height:80px}
.close-btn{margin-top:15px;padding:8px 20px;background:#2563eb;color:#fff;border:none;border-radius:6px}
#queryPage,#syncPage{display:none}
</style>

<div class="head">
  <div class="title">瑞盛服饰货品管理</div>
  <div class="nav">
    <button class="nav-btn active" onclick="switchPage('add')">添加记录</button>
    <button class="nav-btn" onclick="switchPage('query')">查询记录</button>
    <button class="nav-btn" onclick="switchPage('sync')">数据同步</button>
  </div>
  <div class="stats">
    <div class="stat"><div class="label">总记录</div><div class="num" id="totalCount">0</div></div>
    <div class="stat"><div class="label">男款</div><div class="num" id="maleCount">0</div></div>
    <div class="stat"><div class="label">女款</div><div class="num" id="femaleCount">0</div></div>
  </div>
</div>

<!-- 添加记录页 -->
<div id="addPage" class="page">
  <div class="card">
    <div class="form-item">
      <div class="form-label">货品编号</div>
      <input class="form-input" id="goodsNo" placeholder="自动生成/手动修改">
    </div>
    <div class="form-item">
      <div class="form-label">品牌Logo</div>
      <input class="form-input" id="logo" placeholder="如：Nike、Adidas">
    </div>
    <div class="form-item">
      <div class="form-label">货品型号</div>
      <input class="form-input" id="model" placeholder="如：2025款、经典款">
    </div>
    <div class="row">
      <div class="col form-item">
        <div class="form-label">性别</div>
        <select class="form-input" id="gender">
          <option value="">请选择</option>
          <option value="male">男</option>
          <option value="female">女</option>
        </select>
      </div>
      <div class="col form-item">
        <div class="form-label">尺码</div>
        <select class="form-input" id="size">
          <option value="">请选择</option>
          <option>35</option><option>36</option><option>37</option><option>38</option><option>39</option>
          <option>40</option><option>41</option><option>42</option><option>43</option><option>44</option>
          <option>45</option><option>46</option><option>47</option>
        </select>
      </div>
    </div>
    <div class="btn-group">
      <button class="btn" onclick="resetAddForm()">重置</button>
      <button class="btn btn-primary" onclick="saveRecord()">保存记录</button>
    </div>
  </div>
</div>

<!-- 查询记录页 -->
<div id="queryPage" class="page">
  <div class="card">
    <div class="row">
      <div class="col form-item">
        <div class="form-label">品牌Logo</div>
        <input class="form-input" id="qLogo" placeholder="关键词搜索">
      </div>
      <div class="col form-item">
        <div class="form-label">性别</div>
        <select class="form-input" id="qGender">
          <option value="">全部</option>
          <option value="male">男</option>
          <option value="female">女</option>
        </select>
      </div>
    </div>
    <div class="row" style="margin-top:8px">
      <div class="col form-item">
        <div class="form-label">尺码</div>
        <select class="form-input" id="qSize">
          <option value="">全部</option>
          <option>35</option><option>36</option><option>37</option><option>38</option><option>39</option>
          <option>40</option><option>41</option><option>42</option><option>43</option><option>44</option>
          <option>45</option><option>46</option><option>47</option>
        </select>
      </div>
      <div class="col form-item">
        <div class="form-label">货品型号</div>
        <input class="form-input" id="qModel" placeholder="关键词搜索">
      </div>
    </div>
    <div class="btn-group">
      <button class="btn" onclick="resetQueryForm()">重置</button>
      <button class="btn btn-primary" onclick="queryRecords()">查询</button>
    </div>
    <table class="table">
      <thead>
        <tr><th>编号</th><th>品牌</th><th>型号</th><th>性别</th><th>尺码</th><th>操作</th></tr>
      </thead>
      <tbody id="recordTable"></tbody>
    </table>
  </div>
</div>

<!-- 数据同步页 -->
<div id="syncPage" class="page">
  <div class="card">
    <h3 style="font-size:16px;margin-bottom:15px;text-align:center">数据同步（二维码版）</h3>
    <div class="sync-btn">
      <button onclick="showExportModal()">导出数据（生成二维码）</button>
      <button onclick="showImportModal()" style="margin-left:10px">导入数据（扫码/粘贴）</button>
    </div>
    <div style="margin-top:20px;padding:15px;background:#f8f9fa;border-radius:8px">
      <h4 style="font-size:14px;margin-bottom:10px">使用说明：</h4>
      <ul style="font-size:13px;line-height:1.6;padding-left:20px">
        <li>PC → 手机：在PC端点击「导出数据」，手机端点击「导入数据」扫码</li>
        <li>手机 → PC：在手机端点击「导出数据」，PC端点击「导入数据」粘贴文本</li>
        <li>数据永久保存在本地，刷新/关闭网页都不会丢失</li>
      </ul>
    </div>
  </div>
</div>

<!-- 导出二维码弹窗 -->
<div class="modal" id="exportModal">
  <div class="modal-content">
    <h3 style="margin-bottom:10px">导出数据二维码</h3>
    <div class="qrcode-container" id="qrcode"></div>
    <p style="font-size:12px;color:#666;margin:10px 0">扫码或复制下方文本导入</p>
    <textarea id="exportText" style="width:100%;height:80px;margin:10px 0;padding:8px;font-size:12px" readonly></textarea>
    <button class="close-btn" onclick="closeModal('exportModal')">关闭</button>
  </div>
</div>

<!-- 导入数据弹窗 -->
<div class="modal" id="importModal">
  <div class="modal-content">
    <h3 style="margin-bottom:10px">导入数据</h3>
    <p style="font-size:13px;margin-bottom:15px">粘贴二维码文本或扫码结果</p>
    <div id="import-area" onclick="this.querySelector('textarea').focus()">
      <textarea id="importText" style="width:100%;height:100%;border:none;outline:none" placeholder="请粘贴导出的文本内容..."></textarea>
    </div>
    <button onclick="importData()" style="margin-top:10px;padding:8px 20px;background:#10b981;color:#fff;border:none;border-radius:6px">确认导入</button>
    <button class="close-btn" onclick="closeModal('importModal')">关闭</button>
  </div>
</div>

<script>
// 本地存储KEY（固定不变，保证数据永久存储）
const STORAGE_KEY = "PERMANENT_RETURN_MANAGE_DATA";
// 全局数据
let recordList = [];

// 初始化：从本地存储加载数据（核心：保证刷新不丢数据）
function initData() {
  try {
    const savedData = localStorage.getItem(STORAGE_KEY);
    recordList = savedData ? JSON.parse(savedData) : [];
  } catch (e) {
    recordList = [];
  }
  updateStats();
  generateGoodsNo();
}

// 保存数据到本地存储（核心：永久存储）
function saveDataToLocal() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(recordList));
  } catch (e) {
    alert('数据保存失败，请清理浏览器缓存后重试');
  }
  updateStats();
}

// 更新统计数据
function updateStats() {
  const total = recordList.length;
  const male = recordList.filter(item => item.gender === 'male').length;
  const female = recordList.filter(item => item.gender === 'female').length;
  
  document.getElementById('totalCount').innerText = total;
  document.getElementById('maleCount').innerText = male;
  document.getElementById('femaleCount').innerText = female;
}

// 生成货品编号
function generateGoodsNo() {
  if (recordList.length === 0) {
    document.getElementById('goodsNo').value = '1';
    return;
  }
  const maxNo = Math.max(...recordList.map(item => parseInt(item.goodsNo || 0)));
  document.getElementById('goodsNo').value = (maxNo + 1).toString();
}

// 重置添加表单
function resetAddForm() {
  document.getElementById('logo').value = '';
  document.getElementById('model').value = '';
  document.getElementById('gender').value = '';
  document.getElementById('size').value = '';
  generateGoodsNo();
}

// 保存记录
function saveRecord() {
  const goodsNo = document.getElementById('goodsNo').value.trim();
  const logo = document.getElementById('logo').value.trim();
  const model = document.getElementById('model').value.trim();
  const gender = document.getElementById('gender').value;
  const size = document.getElementById('size').value;

  // 验证必填项
  if (!goodsNo) { alert('请填写货品编号'); return; }
  if (!logo) { alert('请填写品牌Logo'); return; }
  if (!model) { alert('请填写货品型号'); return; }
  if (!gender) { alert('请选择性别'); return; }
  if (!size) { alert('请选择尺码'); return; }

  // 移除重复编号
  recordList = recordList.filter(item => item.goodsNo !== goodsNo);
  // 添加新记录
  recordList.push({ goodsNo, logo, model, gender, size });
  // 保存到本地（永久存储）
  saveDataToLocal();
  // 重置表单
  resetAddForm();
  
  alert('保存成功！数据已永久存储，刷新/关闭网页都不会丢失');
}

// 删除记录
function deleteRecord(goodsNo) {
  if (!confirm('确定删除这条记录吗？')) return;
  
  recordList = recordList.filter(item => item.goodsNo !== goodsNo);
  saveDataToLocal();
  queryRecords();
}

// 查询记录
function queryRecords() {
  const qLogo = document.getElementById('qLogo').value.toLowerCase();
  const qGender = document.getElementById('qGender').value;
  const qSize = document.getElementById('qSize').value;
  const qModel = document.getElementById('qModel').value.toLowerCase();

  const filtered = recordList.filter(item => {
    if (qLogo && !item.logo.toLowerCase().includes(qLogo)) return false;
    if (qGender && item.gender !== qGender) return false;
    if (qSize && item.size !== qSize) return false;
    if (qModel && !item.model.toLowerCase().includes(qModel)) return false;
    return true;
  });

  const tableBody = document.getElementById('recordTable');
  if (filtered.length === 0) {
    tableBody.innerHTML = '<tr><td colspan="6" align="center">暂无匹配记录</td></tr>';
    return;
  }

  let html = '';
  filtered.forEach(item => {
    html += `<tr>
      <td>${item.goodsNo}</td>
      <td>${item.logo}</td>
      <td>${item.model}</td>
      <td>${item.gender === 'male' ? '男' : '女'}</td>
      <td>${item.size}</td>
      <td><button class="del-btn" onclick="deleteRecord('${item.goodsNo}')">删除</button></td>
    </tr>`;
  });
  tableBody.innerHTML = html;
}

// 重置查询表单
function resetQueryForm() {
  document.getElementById('qLogo').value = '';
  document.getElementById('qGender').value = '';
  document.getElementById('qSize').value = '';
  document.getElementById('qModel').value = '';
  queryRecords();
}

// 切换页面
function switchPage(page) {
  document.getElementById('addPage').style.display = page === 'add' ? 'block' : 'none';
  document.getElementById('queryPage').style.display = page === 'query' ? 'block' : 'none';
  document.getElementById('syncPage').style.display = page === 'sync' ? 'block' : 'none';
  
  const navBtns = document.querySelectorAll('.nav-btn');
  navBtns[0].classList.toggle('active', page === 'add');
  navBtns[1].classList.toggle('active', page === 'query');
  navBtns[2].classList.toggle('active', page === 'sync');
  
  if (page === 'query') {
    queryRecords();
  }
}

// 导出数据生成二维码
function showExportModal() {
  // 转换数据为文本
  const dataStr = btoa(JSON.stringify(recordList));
  document.getElementById('exportText').value = dataStr;
  
  // 生成二维码
  const qrcodeEl = document.getElementById('qrcode');
  qrcodeEl.innerHTML = '';
  QRCode.toCanvas(qrcodeEl, dataStr, {
    width: 220,
    margin: 1
  }, function (error) {
    if (error) console.error(error)
  });
  
  // 显示弹窗
  document.getElementById('exportModal').style.display = 'flex';
}

// 显示导入弹窗
function showImportModal() {
  document.getElementById('importText').value = '';
  document.getElementById('importModal').style.display = 'flex';
}

// 关闭弹窗
function closeModal(modalId) {
  document.getElementById(modalId).style.display = 'none';
}

// 导入数据
function importData() {
  const importText = document.getElementById('importText').value.trim();
  if (!importText) {
    alert('请粘贴导出的文本内容');
    return;
  }
  
  try {
    // 解码数据
    const dataStr = atob(importText);
    const importedData = JSON.parse(dataStr);
    
    // 合并数据（去重）
    recordList = importedData;
    // 保存到本地
    saveDataToLocal();
    
    alert('导入成功！数据已更新');
    closeModal('importModal');
    // 刷新查询页面
    if (document.getElementById('queryPage').style.display === 'block') {
      queryRecords();
    }
  } catch (e) {
    alert('导入失败！请检查文本是否正确');
    console.error(e);
  }
}

// 页面加载初始化
window.onload = function() {
  initData(); // 加载本地永久数据
  resetAddForm();
};

// 手动备份数据（可选）
window.backupData = function() {
  const dataStr = JSON.stringify(recordList);
  const blob = new Blob([dataStr], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '货品管理数据_' + new Date().toLocaleDateString() + '.json';
  a.click();
  alert('数据已备份到本地文件！');
};
</script>
</body>
</html>
