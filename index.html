<!DOCTYPE html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>瑞盛服饰货品管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f6f7f9;font-family:Arial}
.head{background:#fff;padding:12px;position:sticky;top:0;z-index:10}
.title{text-align:center;font-weight:bold;font-size:17px;margin-bottom:8px}
.nav{display:flex;gap:6px;margin-bottom:10px}
.nav-btn{flex:1;padding:10px;border:none;border-radius:6px;background:#eee;font-size:14px}
.nav-btn.active{background:#2563eb;color:#fff}
.stats{display:flex;gap:6px}
.stat{flex:1;background:#eef2ff;padding:8px;border-radius:6px;text-align:center}
.stat .label{font-size:12px;color:#666}
.stat .num{font-weight:bold;font-size:16px}
.page{padding:12px}
.card{background:#fff;border-radius:10px;padding:14px;box-shadow:0 2px 5px #eee}
.form-item{margin-bottom:12px}
.form-label{font-size:14px;margin-bottom:4px}
.form-input{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:14px}
.row{display:flex;gap:8px}
.col{flex:1}
.btn-group{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}
.btn{padding:8px 14px;border-radius:6px;border:none;font-size:14px;cursor:pointer}
.btn-primary{background:#2563eb;color:#fff}
.table{width:100%;border-collapse:collapse;margin-top:12px}
.table th{background:#f9fafb;padding:8px;text-align:left;font-size:13px}
.table td{padding:8px;border-bottom:1px solid #eee;font-size:14px}
.del-btn{color:#ef4444;border:none;background:none;cursor:pointer}
.loading{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.8);display:flex;justify-content:center;align-items:center;z-index:999;display:none}
.loading-text{background:#fff;padding:15px 20px;border-radius:8px;font-size:14px}
#queryPage{display:none}
</style>

<!-- 加载提示 -->
<div class="loading" id="loading">
  <div class="loading-text">同步数据中...</div>
</div>

<div class="head">
  <div class="title">瑞盛服饰货品管理</div>
  <div class="nav">
    <button class="nav-btn active" onclick="switchPage('add')">添加记录</button>
    <button class="nav-btn" onclick="switchPage('query')">查询记录</button>
  </div>
  <div class="stats">
    <div class="stat"><div class="label">总记录</div><div class="num" id="totalCount">0</div></div>
    <div class="stat"><div class="label">男款</div><div class="num" id="maleCount">0</div></div>
    <div class="stat"><div class="label">女款</div><div class="num" id="femaleCount">0</div></div>
  </div>
</div>

<div id="addPage" class="page">
  <div class="card">
    <div class="form-item">
      <div class="form-label">货品编号</div>
      <input class="form-input" id="goodsNo" placeholder="自动生成/手动修改">
    </div>
    <div class="form-item">
      <div class="form-label">品牌Logo</div>
      <input class="form-input" id="logo" placeholder="如：Nike、Adidas">
    </div>
    <div class="form-item">
      <div class="form-label">货品型号</div>
      <input class="form-input" id="model" placeholder="如：2025款、经典款">
    </div>
    <div class="row">
      <div class="col form-item">
        <div class="form-label">性别</div>
        <select class="form-input" id="gender">
          <option value="">请选择</option>
          <option value="male">男</option>
          <option value="female">女</option>
        </select>
      </div>
      <div class="col form-item">
        <div class="form-label">尺码</div>
        <select class="form-input" id="size">
          <option value="">请选择</option>
          <option>35</option><option>36</option><option>37</option><option>38</option><option>39</option>
          <option>40</option><option>41</option><option>42</option><option>43</option><option>44</option>
          <option>45</option><option>46</option><option>47</option>
        </select>
      </div>
    </div>
    <div class="btn-group">
      <button class="btn" onclick="resetAddForm()">重置</button>
      <button class="btn btn-primary" onclick="saveRecord()">保存并同步</button>
    </div>
  </div>
</div>

<div id="queryPage" class="page">
  <div class="card">
    <div class="row">
      <div class="col form-item">
        <div class="form-label">品牌Logo</div>
        <input class="form-input" id="qLogo" placeholder="关键词搜索">
      </div>
      <div class="col form-item">
        <div class="form-label">性别</div>
        <select class="form-input" id="qGender">
          <option value="">全部</option>
          <option value="male">男</option>
          <option value="female">女</option>
        </select>
      </div>
    </div>
    <div class="row" style="margin-top:8px">
      <div class="col form-item">
        <div class="form-label">尺码</div>
        <select class="form-input" id="qSize">
          <option value="">全部</option>
          <option>35</option><option>36</option><option>37</option><option>38</option><option>39</option>
          <option>40</option><option>41</option><option>42</option><option>43</option><option>44</option>
          <option>45</option><option>46</option><option>47</option>
        </select>
      </div>
      <div class="col form-item">
        <div class="form-label">货品型号</div>
        <input class="form-input" id="qModel" placeholder="关键词搜索">
      </div>
    </div>
    <div class="btn-group">
      <button class="btn" onclick="resetQueryForm()">重置</button>
      <button class="btn btn-primary" onclick="queryRecords()">查询</button>
    </div>
    <table class="table">
      <thead>
        <tr><th>编号</th><th>品牌</th><th>型号</th><th>性别</th><th>尺码</th><th>操作</th></tr>
      </thead>
      <tbody id="recordTable"></tbody>
    </table>
  </div>
</div>

<script>
// 核心配置：替换成你的专属标识（随便改，比如你的名字拼音）
const UNIQUE_KEY = "my_return_manage_2026";
// 全局数据存储
let recordList = [];

// 显示/隐藏加载提示
function showLoading() { document.getElementById('loading').style.display = 'flex'; }
function hideLoading() { document.getElementById('loading').style.display = 'none'; }

// 从云端读取数据（核心修复：强制刷新）
async function loadFromCloud() {
  showLoading();
  try {
    // 使用稳定的云端存储接口
    const response = await fetch(`https://kvdb.io/${UNIQUE_KEY}/data`, {
      method: 'GET',
      cache: 'no-cache' // 强制不缓存，保证拿到最新数据
    });
    
    if (response.ok) {
      const data = await response.text();
      recordList = data ? JSON.parse(data) : [];
    } else {
      recordList = [];
    }
  } catch (error) {
    // 云端失败时读取本地备份
    const localData = localStorage.getItem(UNIQUE_KEY);
    recordList = localData ? JSON.parse(localData) : [];
  }
  
  // 更新统计和表单
  updateStats();
  generateGoodsNo();
  hideLoading();
}

// 保存到云端（核心修复：双重存储）
async function saveToCloud() {
  showLoading();
  try {
    // 保存到云端
    await fetch(`https://kvdb.io/${UNIQUE_KEY}/data`, {
      method: 'PUT',
      body: JSON.stringify(recordList),
      headers: { 'Content-Type': 'application/json' }
    });
    // 同时备份到本地
    localStorage.setItem(UNIQUE_KEY, JSON.stringify(recordList));
  } catch (error) {
    // 云端失败时只存本地
    localStorage.setItem(UNIQUE_KEY, JSON.stringify(recordList));
  }
  hideLoading();
}

// 更新统计数据（核心修复：强制刷新DOM）
function updateStats() {
  const total = recordList.length;
  const male = recordList.filter(item => item.gender === 'male').length;
  const female = recordList.filter(item => item.gender === 'female').length;
  
  // 强制更新DOM，解决统计不变化问题
  document.getElementById('totalCount').innerText = total;
  document.getElementById('maleCount').innerText = male;
  document.getElementById('femaleCount').innerText = female;
  
  // 同步更新查询页面（如果当前在查询页）
  if (document.getElementById('queryPage').style.display === 'block') {
    queryRecords();
  }
}

// 生成货品编号
function generateGoodsNo() {
  if (recordList.length === 0) {
    document.getElementById('goodsNo').value = '1';
    return;
  }
  const maxNo = Math.max(...recordList.map(item => parseInt(item.goodsNo || 0)));
  document.getElementById('goodsNo').value = (maxNo + 1).toString();
}

// 重置添加表单
function resetAddForm() {
  document.getElementById('logo').value = '';
  document.getElementById('model').value = '';
  document.getElementById('gender').value = '';
  document.getElementById('size').value = '';
  generateGoodsNo();
}

// 保存记录（核心修复：完整的流程）
async function saveRecord() {
  // 获取表单值
  const goodsNo = document.getElementById('goodsNo').value.trim();
  const logo = document.getElementById('logo').value.trim();
  const model = document.getElementById('model').value.trim();
  const gender = document.getElementById('gender').value;
  const size = document.getElementById('size').value;

  // 验证必填项
  if (!goodsNo) { alert('请填写货品编号'); return; }
  if (!logo) { alert('请填写品牌Logo'); return; }
  if (!model) { alert('请填写货品型号'); return; }
  if (!gender) { alert('请选择性别'); return; }
  if (!size) { alert('请选择尺码'); return; }

  // 移除重复编号的记录
  recordList = recordList.filter(item => item.goodsNo !== goodsNo);
  // 添加新记录
  recordList.push({ goodsNo, logo, model, gender, size });
  // 保存到云端+本地
  await saveToCloud();
  // 强制刷新统计
  updateStats();
  // 重置表单
  resetAddForm();
  
  alert('保存成功！数据已同步到云端');
}

// 删除记录
async function deleteRecord(goodsNo) {
  if (!confirm('确定删除这条记录吗？')) return;
  
  // 删除对应记录
  recordList = recordList.filter(item => item.goodsNo !== goodsNo);
  // 保存到云端
  await saveToCloud();
  // 刷新统计和表格
  updateStats();
  queryRecords();
}

// 查询记录
function queryRecords() {
  const qLogo = document.getElementById('qLogo').value.toLowerCase();
  const qGender = document.getElementById('qGender').value;
  const qSize = document.getElementById('qSize').value;
  const qModel = document.getElementById('qModel').value.toLowerCase();

  // 过滤记录
  const filtered = recordList.filter(item => {
    if (qLogo && !item.logo.toLowerCase().includes(qLogo)) return false;
    if (qGender && item.gender !== qGender) return false;
    if (qSize && item.size !== qSize) return false;
    if (qModel && !item.model.toLowerCase().includes(qModel)) return false;
    return true;
  });

  // 渲染表格
  const tableBody = document.getElementById('recordTable');
  if (filtered.length === 0) {
    tableBody.innerHTML = '<tr><td colspan="6" align="center">暂无匹配记录</td></tr>';
    return;
  }

  let html = '';
  filtered.forEach(item => {
    html += `<tr>
      <td>${item.goodsNo}</td>
      <td>${item.logo}</td>
      <td>${item.model}</td>
      <td>${item.gender === 'male' ? '男' : '女'}</td>
      <td>${item.size}</td>
      <td><button class="del-btn" onclick="deleteRecord('${item.goodsNo}')">删除</button></td>
    </tr>`;
  });
  tableBody.innerHTML = html;
}

// 重置查询表单
function resetQueryForm() {
  document.getElementById('qLogo').value = '';
  document.getElementById('qGender').value = '';
  document.getElementById('qSize').value = '';
  document.getElementById('qModel').value = '';
  queryRecords();
}

// 切换页面
function switchPage(page) {
  document.getElementById('addPage').style.display = page === 'add' ? 'block' : 'none';
  document.getElementById('queryPage').style.display = page === 'query' ? 'block' : 'none';
  
  // 更新导航按钮状态
  const navBtns = document.querySelectorAll('.nav-btn');
  navBtns[0].classList.toggle('active', page === 'add');
  navBtns[1].classList.toggle('active', page === 'query');
  
  // 查询页刷新数据
  if (page === 'query') {
    queryRecords();
  }
}

// 页面初始化（核心修复：先加载数据再渲染）
window.onload = async function() {
  await loadFromCloud(); // 先加载云端数据
  resetAddForm();        // 再初始化表单
};

// 手动刷新数据（方便测试）
window.refreshData = async function() {
  await loadFromCloud();
  alert('数据已从云端刷新！');
};
</script>
