<!DOCTYPE html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>瑞盛货品管理</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
<style>
*{box-sizing:border-box}
body{margin:0;background:#f5f7fa;font-family:Arial}
.head{background:white;padding:12px}
.title{text-align:center;font-weight:bold;margin-bottom:8px}
.nav{display:flex;gap:6px;margin-bottom:10px}
.navbtn{flex:1;padding:10px;border:none;border-radius:6px;background:#e5e7eb}
.navbtn.active{background:#2563eb;color:white}
.stats{display:flex;gap:6px}
.stat{flex:1;background:#eef2ff;padding:8px;border-radius:6px;text-align:center}
.stat .l{font-size:12px;color:#666}
.stat .n{font-weight:bold}
.page{padding:12px}
.card{background:white;border-radius:10px;padding:14px}
.item{margin-bottom:12px}
.label{font-size:14px;margin-bottom:4px}
.input{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px}
.row{display:flex;gap:8px}
.col{flex:1}
.btns{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}
.btn{padding:8px 14px;border-radius:6px;border:none}
.btn1{background:#2563eb;color:white}
.table{width:100%;border-collapse:collapse;margin-top:12px}
.table th{background:#f9fafb;padding:8px;text-align:left;font-size:13px}
.table td{padding:8px;border-bottom:1px solid #eee;font-size:14px}
.del{color:red;border:none;background:none}
.sync-bar{background:#eef2ff;padding:10px;text-align:center;margin:8px 12px;border-radius:6px}
.sync-bar .btn{margin:0 5px}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;justify-content:center;align-items:center;z-index:999;display:none}
.modal-content{background:white;padding:20px;border-radius:10px;width:90%;max-width:400px}
.qrcode{margin:10px 0;text-align:center}
#import-area{width:100%;height:80px;margin:10px 0;padding:8px;border:1px dashed #ddd;border-radius:6px}
#queryPage{display:none}
</style>

<div class="head">
  <div class="title">瑞盛货品管理</div>
  <div class="nav">
    <button class="navbtn active" onclick="go('add')">添加</button>
    <button class="navbtn" onclick="go('query')">查询</button>
  </div>
  <div class="stats">
    <div class="stat"><div class="l">总记录</div><div class="n" id="total">0</div></div>
    <div class="stat"><div class="l">男款</div><div class="n" id="male">0</div></div>
    <div class="stat"><div class="l">女款</div><div class="n" id="female">0</div></div>
  </div>
</div>

<div class="sync-bar">
  <button class="btn btn1" onclick="exportData()">📤 一键导出</button>
  <button class="btn" onclick="importData()">📥 一键导入</button>
</div>

<div id="addPage" class="page">
<div class="card">
  <div class="item">
    <div class="label">货品编号</div>
    <input class="input" id="goodsNo">
  </div>
  <div class="item">
    <div class="label">品牌</div>
    <input class="input" id="logo" placeholder="如：Nike">
  </div>
  <div class="item">
    <div class="label">型号</div>
    <input class="input" id="model" placeholder="如：2025款">
  </div>
  <div class="row">
    <div class="col item">
      <div class="label">性别</div>
      <select class="input" id="gender">
        <option value="">请选择</option>
        <option value="male">男</option>
        <option value="female">女</option>
      </select>
    </div>
    <div class="col item">
      <div class="label">尺码</div>
      <select class="input" id="size">
        <option value="">请选择</option>
        <option>35</option><option>36</option><option>37</option><option>38</option><option>39</option>
        <option>40</option><option>41</option><option>42</option><option>43</option><option>44</option>
        <option>45</option><option>46</option><option>47</option>
      </select>
    </div>
  </div>
  <div class="btns">
    <button class="btn" onclick="resetAdd()">重置</button>
    <button class="btn btn1" onclick="save()">保存</button>
  </div>
</div>
</div>

<div id="queryPage" class="page">
<div class="card">
  <div class="row">
    <div class="col item"><div class="label">品牌</div><input class="input" id="qLogo"></div>
    <div class="col item"><div class="label">性别</div><select class="input" id="qGender"><option value="">全部</option><option value="male">男</option><option value="female">女</option></select></div>
  </div>
  <div class="row" style="margin-top:8px">
    <div class="col item"><div class="label">尺码</div><select class="input" id="qSize">
      <option value="">全部</option>
      <option>35</option><option>36</option><option>37</option><option>38</option><option>39</option>
      <option>40</option><option>41</option><option>42</option><option>43</option><option>44</option>
      <option>45</option><option>46</option><option>47</option>
    </select></div>
    <div class="col item"><div class="label">型号</div><input class="input" id="qModel"></div>
  </div>
  <div class="btns">
    <button class="btn" onclick="resetQuery()">重置</button>
    <button class="btn btn1" onclick="render()">查询</button>
  </div>
  <table class="table">
    <thead><tr><th>编号</th><th>品牌</th><th>型号</th><th>性别</th><th>尺码</th><th>操作</th></tr></thead>
    <tbody id="tb"></tbody>
  </table>
</div>
</div>

<!-- 导出弹窗 -->
<div class="modal" id="exportModal">
  <div class="modal-content">
    <h3 style="text-align:center;margin-bottom:10px">📤 导出数据</h3>
    <div class="qrcode" id="qrcode"></div>
    <p style="font-size:12px;color:#02a902;text-align:center">✅ 数据已自动复制到剪贴板</p>
    <textarea id="exportText" readonly style="width:100%;height:60px;padding:8px;border-radius:6px"></textarea>
    <div class="btns" style="justify-content:center">
      <button class="btn" onclick="closeModal('exportModal')">关闭</button>
    </div>
  </div>
</div>

<!-- 导入弹窗 -->
<div class="modal" id="importModal">
  <div class="modal-content">
    <h3 style="text-align:center;margin-bottom:10px">📥 导入数据</h3>
    <p style="font-size:12px;color:#666">粘贴导出的文本内容</p>
    <div class="import-area">
      <textarea id="importText" placeholder="粘贴到这里..." style="width:100%;height:100px;border:none;outline:none;padding:8px"></textarea>
    </div>
    <div class="btns" style="justify-content:center;margin-top:10px">
      <button class="btn btn1" onclick="confirmImport()">✅ 确认导入</button>
      <button class="btn" onclick="closeModal('importModal')">取消</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = "goods_data_simple";
let data = [];

// 加载本地数据
function loadData() {
  try { data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [] } catch { data = [] }
  updateStats();
  autoNo();
}

// 保存到本地
function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  updateStats();
}

// 更新统计
function updateStats() {
  document.getElementById("total").innerText = data.length;
  document.getElementById("male").innerText = data.filter(x=>x.gender=="male").length;
  document.getElementById("female").innerText = data.filter(x=>x.gender=="female").length;
}

// 自动生成编号
function autoNo() {
  if (!data.length) { document.getElementById("goodsNo").value = "1"; return; }
  const maxNo = Math.max(...data.map(x=>+x.goodsNo || 0));
  document.getElementById("goodsNo").value = (maxNo + 1).toString();
}

// 重置添加表单
function resetAdd() {
  document.getElementById("logo").value = "";
  document.getElementById("model").value = "";
  document.getElementById("gender").value = "";
  document.getElementById("size").value = "";
  autoNo();
}

// 保存记录
function save() {
  const goodsNo = document.getElementById("goodsNo").value.trim();
  const logo = document.getElementById("logo").value.trim();
  const model = document.getElementById("model").value.trim();
  const gender = document.getElementById("gender").value;
  const size = document.getElementById("size").value;
  if (!goodsNo || !logo || !model || !gender || !size) return;
  data = data.filter(x=>x.goodsNo != goodsNo);
  data.push({ goodsNo, logo, model, gender, size });
  saveData();
  resetAdd();
}

// 删除记录
function del(goodsNo) {
  data = data.filter(x=>x.goodsNo != goodsNo);
  saveData();
  render();
}

// 渲染查询列表
function render() {
  const qLogo = document.getElementById("qLogo").value.toLowerCase();
  const qGender = document.getElementById("qGender").value;
  const qSize = document.getElementById("qSize").value;
  const qModel = document.getElementById("qModel").value.toLowerCase();
  const list = data.filter(x=>{
    if (qLogo && !x.logo.toLowerCase().includes(qLogo)) return false;
    if (qGender && x.gender != qGender) return false;
    if (qSize && x.size != qSize) return false;
    if (qModel && !x.model.toLowerCase().includes(qModel)) return false;
    return true;
  });
  let html = "";
  list.forEach(x=>{
    html+=`<tr>
      <td>${x.goodsNo}</td>
      <td>${x.logo}</td>
      <td>${x.model}</td>
      <td>${x.gender=="male"?"男":"女"}</td>
      <td>${x.size}</td>
      <td><button class="del" onclick="del('${x.goodsNo}')">删除</button></td>
    </tr>`;
  });
  if (!list.length) html='<tr><td colspan="6" align="center">无数据</td></tr>';
  document.getElementById("tb").innerHTML = html;
}

// 重置查询表单
function resetQuery() {
  document.getElementById("qLogo").value = "";
  document.getElementById("qGender").value = "";
  document.getElementById("qSize").value = "";
  document.getElementById("qModel").value = "";
  render();
}

// 切换页面
function go(page) {
  document.getElementById("addPage").style.display = page=="add"?"block":"none";
  document.getElementById("queryPage").style.display = page=="query"?"block":"none";
  document.querySelectorAll(".navbtn").forEach((btn,i)=>{
    btn.classList.toggle("active", i==(page=="add"?0:1));
  });
  if (page=="query") render();
}

// 导出数据 + 自动复制
function exportData() {
  const text = btoa(JSON.stringify(data));
  document.getElementById("exportText").value = text;

  // 自动复制
  navigator.clipboard.writeText(text).then(() => {
    console.log("自动复制成功");
  }).catch(err => {});

  QRCode.toCanvas(document.getElementById("qrcode"), text, {width:200}, (err)=>{});
  document.getElementById("exportModal").style.display = "flex";
}

// 导入数据弹窗
function importData() {
  document.getElementById("importText").value = "";
  document.getElementById("importModal").style.display = "flex";
}

// 确认导入
function confirmImport() {
  const text = document.getElementById("importText").value.trim();
  if (!text) { alert("请粘贴导出的文本内容！"); return; }
  try {
    data = JSON.parse(atob(text));
    saveData();
    closeModal('importModal');
    render();
    alert("✅ 导入成功！");
  } catch(e) { alert("❌ 导入失败，请检查文本是否正确！"); }
}

// 关闭弹窗
function closeModal(id) {
  document.getElementById(id).style.display = "none";
}

// 初始化
window.onload = function() {
  loadData();
  resetAdd();
};
</script>
</html>
